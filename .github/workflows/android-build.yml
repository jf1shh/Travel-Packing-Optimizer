name: Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'
        
    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Build Web
      run: npm run build
      env:
        CAPACITOR: "1"
      
    - name: Sync Capacitor
      run: npx cap sync
      
    - name: Build APK
      run: |
        cd android
        sudo apt-get update && sudo apt-get install -y dos2unix
        dos2unix gradlew
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: TravelPacker-APK
        path: android/app/build/outputs/apk/**/*.apk
        if-no-files-found: warn
